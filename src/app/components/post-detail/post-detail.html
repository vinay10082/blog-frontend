<div *ngIf="loading" class="loading">
  <div class="spinner"></div>
</div>

<div *ngIf="!loading && post" class="post-detail-container">
  <a routerLink="/" class="back-link">← Back to Posts</a>
  
  <article class="post-content glass-card">
    <h1>{{ post.title }}</h1>
    <div class="content-body">
      {{ post.content }}
    </div>
  </article>

  <section class="comments-section">
    <h2>Comments ({{ comments.length }})</h2>
    
    <div class="comments-list">
      <div *ngFor="let comment of comments" class="comment-card glass-card">
        <div class="comment-avatar"></div>
        <div class="comment-body">
          <p>{{ comment.content }}</p>
        </div>
      </div>
    </div>

    <div class="add-comment glass-card">
      <h3>Add a Comment</h3>
      <form (ngSubmit)="submitComment()">
        <textarea 
          [(ngModel)]="newCommentContent" 
          name="content" 
          rows="4" 
          placeholder="Share your thoughts..."
          required
        ></textarea>
        <button type="submit" class="btn submit-btn" [disabled]="!newCommentContent.trim() || submittingComment">
          {{ submittingComment ? 'Posting...' : 'Post Comment' }}
        </button>
      </form>
    </div>
  </section>
</div>

<div *ngIf="!loading && !post" class="empty-state">
  <h3>Post not found.</h3>
  <a routerLink="/" class="btn">Return Home</a>
</div>
