<div class="auth-container">
  <div class="glass-card auth-card">
    <h2>Welcome Back</h2>
    <p class="subtitle">Log in to your account</p>

    <div *ngIf="error" class="error-banner">
      {{ error }}
    </div>

    <form (ngSubmit)="login()">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" [(ngModel)]="user.username" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" [(ngModel)]="user.password" required>
      </div>

      <button type="submit" class="btn auth-btn" [disabled]="loading || !user.username || !user.password">
        {{ loading ? 'Logging in...' : 'Log In' }}
      </button>
    </form>
    
    <p class="auth-footer">
      Don't have an account? <a routerLink="/register">Sign up here</a>
    </p>
  </div>
</div>
