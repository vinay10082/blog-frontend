name: Deploy Frontend to S3 and CloudFront

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Build Angular App
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Rename index.csr.html to index.html
        run: |
          if [ -f dist/blog-frontend/browser/index.csr.html ]; then
            mv dist/blog-frontend/browser/index.csr.html dist/blog-frontend/browser/index.html
          fi

      - name: Configure CloudFront for SPA
        run: |
          # Fetch current config
          aws cloudfront get-distribution-config --id ${{ secrets.AWS_CLOUDFRONT_DIST_ID }} > dist.json
          ETAG=$(jq -r '.ETag' dist.json)
          
          # Patch config for DefaultRootObject and SPA routing (403/404 -> index.html)
          jq '.DistributionConfig.DefaultRootObject = "index.html" | 
              .DistributionConfig.CustomErrorResponses = {
                "Quantity": 2,
                "Items": [
                  {
                    "ErrorCode": 403,
                    "ResponsePagePath": "/index.html",
                    "ResponseCode": "200",
                    "ErrorCachingMinTTL": 10
                  },
                  {
                    "ErrorCode": 404,
                    "ResponsePagePath": "/index.html",
                    "ResponseCode": "200",
                    "ErrorCachingMinTTL": 10
                  }
                ]
              } | .DistributionConfig' dist.json > config.json
          
          # Update distribution
          aws cloudfront update-distribution --id ${{ secrets.AWS_CLOUDFRONT_DIST_ID }} --if-match $ETAG --distribution-config file://config.json > /dev/null

      - name: Deploy to S3
        run: aws s3 sync dist/blog-frontend/browser/ s3://${{ secrets.AWS_S3_BUCKET }} --delete

      - name: Invalidate CloudFront Cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_DIST_ID }} --paths "/*"
